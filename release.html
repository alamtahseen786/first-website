<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <meta name="description" content="Release your worries and breathe lighter">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Vanished💜</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Lora&display=swap" rel="stylesheet">

  <style>

    body {

      background-color: #f5f0ff;

      text-align: center;

      font-family: 'Lora', serif;

      margin: 0;

      color: #2d2d2d;

    }

    .container {

      padding: 50px 20px;

    }

    h1 {

      font-size: 45px;

      margin-bottom: 10px;

    }

    .message {

      font-size: 20px;

      color: #555;

    }

    .video-box {

      margin-top: 40px;

    }

    iframe {

      border-radius: 20px;

      box-shadow: 0 8px 20px rgba(0,0,0,0.15);

    }

    button {

      margin-top: 30px;

      padding: 12px 25px;

      border: none;

      border-radius: 10px;

      background: #d6c6ff;

      font-size: 16px;

      cursor: pointer;

      transition: 0.3s;

    }

    button:hover {

      background: #c2adff;

      transform: scale(1.05);

    }

    footer {

      margin-top: 80px;

      background: #cdb7ff;

      padding: 30px;

    }

  </style>

</head>

<body>

  <div class="container">

    <h1>Vanished</h1>

    <p class="message">
      Your thoughts were released into the air.
    </p>

    <p>
      Maybe your heart can rest a little now 💜
    </p>

    <br>

    <h3>
      Stay here for a moment 🌙
    </h3>

    <p>
      Breathe slowly. Let your mind settle.
    </p>

    <div class="video-box">

      <iframe 
        width="500" 
        height="280" 
        src="https://www.youtube-nocookie.com/embed/Xhn6AnCOtMI?si=ZP2ZDvxk_sKVYX9R"
        title="YouTube video player"
        frameborder="0"
        allowfullscreen>
      </iframe>

    </div>

    <br>

    <h3>
      Have more on your mind?
    </h3>

    <a href="index.html">

      <button>
        Write Again 💜
      </button>

    </a>

  </div>

  <footer>

    <p>
      This space was here for you today.
    </p>

  </footer>

</body>

</html>
